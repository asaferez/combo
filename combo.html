<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעצב הארונות של קומבו</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #cfd4db;
    --brand-dark: #a8b0bc;
    --bg: #ffffff;
    --surface: #f5f6f7;
    --surface2: #eceef0;
    --text: #1a1a2e;
    --text2: #6b7280;
    --danger: #e53e3e;
    --ok: #38a169;
    --radius: 4px;
    --font: "Helvetica Neue", Arial, sans-serif;
    --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    height: 56px;
    border-bottom: 1px solid var(--surface2);
    background: var(--bg);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo { display: flex; align-items: center; margin-inline-end: 8px; }
  .logo-svg { height: 38px; width: auto; display: block; }

  .divider { width: 1px; height: 28px; background: var(--surface2); }

  .project-name-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
  .project-name-label { font-size: 11px; color: var(--text2); white-space: nowrap; }
  #projectName {
    border: 1px solid transparent; border-radius: var(--radius);
    padding: 4px 8px; font-size: 14px; font-family: var(--font);
    color: var(--text); background: transparent; width: 220px; transition: border-color 0.15s;
  }
  #projectName:hover { border-color: var(--brand); }
  #projectName:focus { outline: none; border-color: var(--brand-dark); background: var(--surface); }

  .header-actions { display: flex; gap: 8px; margin-inline-start: auto; }

  .btn {
    padding: 6px 14px; border-radius: var(--radius); font-size: 13px;
    font-family: var(--font); font-weight: 500; cursor: pointer;
    border: 1px solid transparent; transition: all 0.15s; white-space: nowrap;
  }
  .btn-ghost { background: transparent; border-color: var(--surface2); color: var(--text2); }
  .btn-ghost:hover { border-color: var(--brand-dark); color: var(--text); background: var(--surface); }
  .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
  .btn-primary:hover { background: #2d2d44; }
  .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
  .btn-danger:hover { background: #c53030; }

  .main { display: flex; flex-direction: row; flex: 1; overflow: hidden; }

  #elevationWrap {
    flex: 1; min-width: 0; background: var(--surface);
    overflow: auto; padding: 24px 24px 16px;
    display: flex; align-items: flex-end;
  }
  #elevation { display: flex; align-items: flex-end; gap: 0; min-height: 100%; }

  .col-preview {
    display: flex; flex-direction: column; border: 2px solid #b0b8c4;
    border-radius: 2px; cursor: pointer; transition: border-color 0.15s;
    position: relative; flex-shrink: 0; background: #fff; overflow: hidden;
  }
  .col-preview:hover { border-color: var(--brand-dark); }
  .col-preview.selected { border-color: var(--text); }

  .col-preview-label {
    position: absolute; top: 4px; left: 0; right: 0;
    text-align: center; font-size: 9px; color: var(--text2);
    letter-spacing: 0.04em; pointer-events: none; z-index: 2;
  }

  .sec-preview {
    width: 100%; border-bottom: 1px solid rgba(0,0,0,0.08);
    position: relative; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; overflow: hidden; min-height: 4px;
  }
  .sec-preview:last-child { border-bottom: none; }

  .sec-preview-label {
    font-size: 9px; color: var(--text2); text-align: center;
    line-height: 1.3; z-index: 2; position: relative;
    pointer-events: none; padding: 2px;
  }

  .sec-open { background: #ffffff; }
  .sec-shelf {
    background: repeating-linear-gradient(
      180deg,
      #f0f0ec 0px, #f0f0ec calc(100% / var(--n, 3) - 2px),
      #c8c8c0 calc(100% / var(--n, 3) - 2px), #c8c8c0 calc(100% / var(--n, 3))
    );
  }
  .sec-hanging { background: #eef3f8; }
  .sec-hanging::before {
    content: ''; position: absolute;
    top: 18%; left: 20%; right: 20%; height: 60%;
    border: 2px solid #7ba7c4; border-bottom: none; border-radius: 50% 50% 0 0;
  }
  .sec-drawer {
    background-image: repeating-linear-gradient(
      180deg,
      #faf5ee 0px, #faf5ee calc(100% / var(--n, 2) - 1px),
      #d4c9b8 calc(100% / var(--n, 2) - 1px), #d4c9b8 calc(100% / var(--n, 2))
    );
  }
  .sec-drawer.glass::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(200,220,240,0.28); pointer-events: none;
  }

  .rem-bar {
    flex-shrink: 0; min-height: 0;
    background: repeating-linear-gradient(45deg,
      rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 4px,
      transparent 4px, transparent 8px);
    border-top: 1px dashed #bbb;
  }
  .rem-bar.over { background: rgba(229,62,62,0.12); border-top-color: var(--danger); }

  .col-preview-add {
    width: 48px; height: 80px; border: 2px dashed var(--brand);
    border-radius: var(--radius); display: flex; align-items: center;
    justify-content: center; cursor: pointer; color: var(--brand-dark);
    font-size: 22px; margin-left: 12px; flex-shrink: 0;
    transition: all 0.15s; align-self: center;
  }
  .col-preview-add:hover { border-color: var(--text); color: var(--text); background: var(--surface2); }

  #editPanel {
    width: 320px; flex-shrink: 0; overflow-y: auto; overflow-x: hidden;
    display: flex; flex-direction: column; gap: 12px; padding: 14px;
    background: var(--bg); align-items: stretch;
    border-inline-end: 1px solid var(--surface2); order: -1;
  }

  .col-card {
    flex-shrink: 0; width: auto; border: 1px solid var(--surface2);
    border-radius: 6px; background: var(--surface);
    display: flex; flex-direction: column;
    transition: border-color 0.15s;
  }
  .col-card.selected { border-color: var(--text); }

  .col-card-head {
    display: flex; align-items: center; gap: 5px;
    padding: 7px 8px; border-bottom: 1px solid var(--surface2); flex-shrink: 0;
  }
  .col-num { font-size: 11px; font-weight: 600; color: var(--text2); width: 16px; }

  .dim-group { display: flex; align-items: center; gap: 3px; }
  .dim-label { font-size: 10px; color: var(--text2); }
  .dim-input {
    width: 46px; border: 1px solid var(--surface2); border-radius: var(--radius);
    padding: 3px 4px; font-size: 12px; font-family: var(--font);
    color: var(--text); background: var(--bg); text-align: center; direction: ltr;
  }
  .dim-input:focus { outline: none; border-color: var(--brand-dark); }
  .dim-unit { font-size: 10px; color: var(--text2); }

  .btn-icon {
    width: 22px; height: 22px; border: 1px solid var(--surface2);
    border-radius: var(--radius); background: var(--bg); cursor: pointer;
    font-size: 11px; display: flex; align-items: center; justify-content: center;
    color: var(--text2); transition: all 0.12s; flex-shrink: 0;
  }
  .btn-icon:hover { border-color: var(--brand-dark); color: var(--text); }
  .btn-icon.del:hover { border-color: var(--danger); color: var(--danger); }
  .spacer { flex: 1; }

  .col-card-body {
    flex: 1; overflow-y: auto; overflow-x: hidden; padding: 6px 8px;
    display: flex; flex-direction: column; gap: 4px;
  }

  .section-row {
    display: flex; flex-direction: column; gap: 5px;
    background: var(--bg); border: 1px solid var(--surface2);
    border-radius: var(--radius); padding: 5px 6px; flex-shrink: 0;
  }

  .section-main { display: flex; align-items: center; gap: 3px; }

  .sec-extras {
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    padding-top: 4px; border-top: 1px dashed var(--surface2);
  }
  .sec-extras .dim-input { width: 38px; }
  .sec-extras label {
    display: flex; align-items: center; gap: 3px;
    font-size: 11px; color: var(--text2); margin-inline-start: 6px; cursor: pointer;
  }
  .sec-extras input[type=checkbox] { width: 12px; height: 12px; cursor: pointer; }

  .rem-indicator {
    font-size: 10px; padding: 3px 8px 5px;
    flex-shrink: 0; color: var(--text2); border-top: 1px solid var(--surface2);
  }
  .rem-indicator .rem-val { font-weight: 600; }
  .rem-indicator.ok .rem-val { color: var(--ok); }
  .rem-indicator.over .rem-val { color: var(--danger); }

  .add-section-btn {
    font-size: 11px; color: var(--text2); background: none;
    border: 1px dashed var(--brand); border-radius: var(--radius);
    padding: 3px 8px; cursor: pointer; width: 100%;
    text-align: start; font-family: var(--font); transition: all 0.12s; flex-shrink: 0;
  }
  .add-section-btn:hover { border-color: var(--text); color: var(--text); }

  .col-card-add {
    flex-shrink: 0; width: 110px; min-height: 80px; border: 2px dashed var(--brand);
    border-radius: 6px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer;
    color: var(--brand-dark); font-size: 11px; gap: 4px;
    transition: all 0.15s; align-self: center;
  }
  .col-card-add:hover { border-color: var(--text); color: var(--text); background: var(--surface); }
  .col-card-add .plus { font-size: 20px; }

  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg); border-radius: 8px; padding: 28px 32px;
    max-width: 380px; width: 90%; box-shadow: var(--shadow-md);
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
  .modal p { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 22px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--brand); border-radius: 3px; }

  .empty-hint {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; width: 100%; color: var(--text2); gap: 12px;
  }
  .empty-hint svg { opacity: 0.2; }
  .empty-hint p { font-size: 13px; }

  /* type-select inline */
  .type-sel {
    border: none; background: transparent; font-size: 11px;
    font-family: var(--font); color: var(--text); cursor: pointer; width: 64px; flex-shrink: 0;
  }
  .type-sel:focus { outline: none; }
</style>
</head>

    <span class="project-name-label">פרויקט</span>
    <input type="text" id="projectName" placeholder="שם הלקוח…" autocomplete="off">
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="btnNew">חדש</button>
    <button class="btn btn-ghost" id="btnImport">ייבוא</button>
    <button class="btn btn-primary" id="btnExport">ייצוא</button>
  </div>
</header>

<div class="main">
  <div id="elevationWrap"><div id="elevation"></div></div>
  <div id="editPanel"></div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none">

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <p id="modalMsg"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel">ביטול</button>
      <button class="btn btn-danger" id="modalConfirm">המשך</button>
    </div>
  </div>
</div>

<script>
// ── Escape helper (prevents XSS in innerHTML templates) ────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── i18n labels ────────────────────────────────────────────────────────
const CM = 'ס"מ';
const TYPE_NAMES = { open: 'פתוח', shelf: 'מדף', hanging: 'תלייה', drawer: 'מגירה' };
const TYPE_ORDER = ['open', 'shelf', 'hanging', 'drawer'];

// ── State ──────────────────────────────────────────────────────────────
let state = { name: '', columns: [] };
let selectedColId = null;
let _saveTimer = null;
let _importPending = null;

function uid() { return Math.random().toString(36).slice(2, 9); }

// ── Persistence ────────────────────────────────────────────────────────
function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    localStorage.setItem('combo-project', JSON.stringify(state));
  }, 300);
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem('combo-project');
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (parsed && Array.isArray(parsed.columns)) {
      state = parsed;
      if (state.columns.length) selectedColId = state.columns[0].id;
    }
  } catch (e) { /* ignore corrupt data */ }
}

// ── Column helpers ─────────────────────────────────────────────────────
function addColumn() {
  const col = { id: uid(), width: 60, totalHeight: 220, sections: [] };
  state.columns.push(col);
  selectedColId = col.id;
  scheduleSave();
  render();
  requestAnimationFrame(() => {
    const card = document.querySelector(`.col-card[data-id="${col.id}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  });
}

function deleteColumn(id) {
  state.columns = state.columns.filter(c => c.id !== id);
  if (selectedColId === id)
    selectedColId = state.columns.length ? state.columns[0].id : null;
  scheduleSave(); render();
}

function moveColumn(id, dir) {
  const i = state.columns.findIndex(c => c.id === id);
  const j = i + dir;
  if (j < 0 || j >= state.columns.length) return;
  [state.columns[i], state.columns[j]] = [state.columns[j], state.columns[i]];
  scheduleSave(); render();
}

function updateColumnProp(id, key, val) {
  const col = state.columns.find(c => c.id === id);
  if (!col) return;
  col[key] = val;
  scheduleSave();
  renderElevation();
  refreshRemIndicator(id);
}

// ── Section helpers ────────────────────────────────────────────────────
function addSection(colId) {
  const col = state.columns.find(c => c.id === colId);
  if (!col) return;
  col.sections.push({ id: uid(), type: 'open', height: 40 });
  scheduleSave(); renderElevation(); renderEditPanel();
}

function deleteSection(colId, secId) {
  const col = state.columns.find(c => c.id === colId);
  if (!col) return;
  col.sections = col.sections.filter(s => s.id !== secId);
  scheduleSave(); renderElevation(); renderEditPanel();
}

function moveSection(colId, secId, dir) {
  const col = state.columns.find(c => c.id === colId);
  if (!col) return;
  const i = col.sections.findIndex(s => s.id === secId);
  const j = i + dir;
  if (j < 0 || j >= col.sections.length) return;
  [col.sections[i], col.sections[j]] = [col.sections[j], col.sections[i]];
  scheduleSave(); renderElevation(); renderEditPanel();
}

function updateSectionProp(colId, secId, key, val) {
  const col = state.columns.find(c => c.id === colId);
  if (!col) return;
  const sec = col.sections.find(s => s.id === secId);
  if (!sec) return;
  sec[key] = val;
  if (key === 'type') {
    delete sec.shelfCount; delete sec.drawerCount; delete sec.glassFront;
    if (val === 'shelf') sec.shelfCount = 3;
    if (val === 'drawer') { sec.drawerCount = 2; sec.glassFront = false; }
  }
  scheduleSave();
  renderElevation();
  refreshRemIndicator(colId);
  if (key === 'type') renderEditPanel();
}

// ── Remaining height ───────────────────────────────────────────────────
function remaining(col) {
  const used = col.sections.reduce((s, sec) => s + (Number(sec.height) || 0), 0);
  return (Number(col.totalHeight) || 0) - used;
}

function refreshRemIndicator(colId) {
  const col = state.columns.find(c => c.id === colId);
  if (!col) return;
  const el = document.querySelector(`.rem-indicator[data-col="${colId}"]`);
  if (!el) return;
  const rem = remaining(col);
  el.className = `rem-indicator ${rem >= 0 ? 'ok' : 'over'}`;
  el.querySelector('.rem-val').textContent =
    rem >= 0 ? `נותרו ${rem} ${CM}` : `חריגה של ${Math.abs(rem)} ${CM}`;
}

// ── Scale ──────────────────────────────────────────────────────────────
function calcScale() {
  if (!state.columns.length) return 2;
  const wrap = document.getElementById('elevationWrap');
  const availW = wrap.clientWidth - 80;
  const availH = wrap.clientHeight - 48;
  const totalCm = state.columns.reduce((s, c) => s + (Number(c.width) || 0), 0) || 60;
  const maxH = Math.max(...state.columns.map(c => Number(c.totalHeight) || 1));
  const byW = Math.max(0.5, availW / totalCm);
  const byH = Math.max(0.5, availH / maxH);
  return Math.min(byW, byH, 4);
}

// ── Elevation rendering ────────────────────────────────────────────────
function renderElevation() {
  const root = document.getElementById('elevation');

  if (!state.columns.length) {
    root.innerHTML = '';
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>';
    const p = document.createElement('p');
    p.textContent = 'הוסיפו את העמודה הראשונה מהפאנל שמימין';
    hint.appendChild(p);
    root.appendChild(hint);
    return;
  }

  const scale = calcScale();
  // Build fragment to avoid touching DOM per section
  const frag = document.createDocumentFragment();

  state.columns.forEach(col => {
    const w = Math.max(8, Math.round((Number(col.width) || 0) * scale));
    const totalH = Math.max(8, Math.round((Number(col.totalHeight) || 0) * scale));
    const rem = remaining(col);
    const remPx = rem > 0 ? Math.round(rem * scale) : 0;
    const overPx = rem < 0 ? Math.round(Math.abs(rem) * scale) : 0;

    const colEl = document.createElement('div');
    colEl.className = 'col-preview' + (col.id === selectedColId ? ' selected' : '');
    colEl.dataset.id = col.id;
    colEl.style.width = w + 'px';
    colEl.style.height = totalH + 'px';
    colEl.addEventListener('click', () => selectCol(col.id));

    if (w >= 28) {
      const lbl = document.createElement('div');
      lbl.className = 'col-preview-label';
      lbl.textContent = col.width + ' ' + CM;
      colEl.appendChild(lbl);
    }

    col.sections.forEach(sec => {
      const h = Math.max(4, Math.round((Number(sec.height) || 0) * scale));
      const secEl = document.createElement('div');
      const glassClass = (sec.type === 'drawer' && sec.glassFront) ? ' glass' : '';
      secEl.className = `sec-preview sec-${sec.type}${glassClass}`;
      secEl.style.height = h + 'px';
      if (sec.type === 'shelf') secEl.style.setProperty('--n', String(sec.shelfCount || 3));
      if (sec.type === 'drawer') secEl.style.setProperty('--n', String(sec.drawerCount || 2));

      if (h >= 18) {
        const lbl = document.createElement('span');
        lbl.className = 'sec-preview-label';
        const typeName = TYPE_NAMES[sec.type] || sec.type;
        let extra = '';
        if (sec.type === 'shelf') extra = ` ×${sec.shelfCount || 3}`;
        if (sec.type === 'drawer') extra = ` ×${sec.drawerCount || 2}`;
        lbl.textContent = typeName + extra + '\n' + sec.height + ' ' + CM;
        secEl.appendChild(lbl);
      }
      colEl.appendChild(secEl);
    });

    // remaining / over bar at bottom (unused space)
    if (remPx > 0) {
      const bar = document.createElement('div');
      bar.className = 'rem-bar';
      bar.style.height = remPx + 'px';
      colEl.appendChild(bar);
    }
    if (overPx > 0) {
      const bar = document.createElement('div');
      bar.className = 'rem-bar over';
      bar.style.height = overPx + 'px';
      colEl.appendChild(bar);
    }

    frag.appendChild(colEl);
  });

  root.innerHTML = '';
  root.appendChild(frag);
}

// ── Edit panel rendering ───────────────────────────────────────────────
function renderEditPanel() {
  const panel = document.getElementById('editPanel');
  if (!state.columns.length) {
    panel.innerHTML = '';
    const addCard = document.createElement('div');
    addCard.className = 'col-card-add';
    const plus = document.createElement('span');
    plus.className = 'plus'; plus.textContent = '+';
    const addLbl = document.createElement('span'); addLbl.textContent = 'הוספת עמודה';
    addCard.appendChild(plus); addCard.appendChild(addLbl);
    addCard.addEventListener('click', addColumn);
    panel.appendChild(addCard);
    return;
  }

  // Build safely using DOM methods to avoid XSS concerns with user data
  const frag = document.createDocumentFragment();

  state.columns.forEach((col, ci) => {
    const rem = remaining(col);
    const remOk = rem >= 0;

    const card = document.createElement('div');
    card.className = 'col-card' + (col.id === selectedColId ? ' selected' : '');
    card.dataset.id = col.id;

    // ── Card header ──
    const head = document.createElement('div');
    head.className = 'col-card-head';

    const numEl = document.createElement('span');
    numEl.className = 'col-num';
    numEl.textContent = String(ci + 1);
    head.appendChild(numEl);

    // Width group
    head.appendChild(makeDimGroup('רוחב', col.width, v => {
      updateColumnProp(col.id, 'width', Math.max(1, v || 1));
      selectCol(col.id);
    }));

    // Height group
    head.appendChild(makeDimGroup('גובה', col.totalHeight, v => {
      updateColumnProp(col.id, 'totalHeight', Math.max(1, v || 1));
      selectCol(col.id);
    }));

    const sp = document.createElement('div');
    sp.className = 'spacer';
    head.appendChild(sp);

    head.appendChild(makeIconBtn('→', 'הזזה ימינה', false, () => moveColumn(col.id, -1)));
    head.appendChild(makeIconBtn('←', 'הזזה שמאלה', false, () => moveColumn(col.id, 1)));
    head.appendChild(makeIconBtn('×', 'מחיקת עמודה', true, () => deleteColumn(col.id)));

    card.appendChild(head);

    // ── Card body (sections) ──
    const body = document.createElement('div');
    body.className = 'col-card-body';
    body.addEventListener('click', () => selectCol(col.id));

    col.sections.forEach(sec => {
      const row = document.createElement('div');
      row.className = 'section-row';

      // ── Main line: type, height, actions ──
      const main = document.createElement('div');
      main.className = 'section-main';

      const sel = document.createElement('select');
      sel.className = 'type-sel';
      TYPE_ORDER.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = TYPE_NAMES[t];
        if (sec.type === t) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => updateSectionProp(col.id, sec.id, 'type', sel.value));
      main.appendChild(sel);

      const hInput = document.createElement('input');
      hInput.type = 'number'; hInput.className = 'dim-input';
      hInput.value = String(sec.height); hInput.min = '1'; hInput.max = '999';
      hInput.style.width = '42px';
      hInput.addEventListener('input', () => {
        updateSectionProp(col.id, sec.id, 'height', Math.max(1, Number(hInput.value) || 1));
      });
      main.appendChild(hInput);

      const unit = document.createElement('span');
      unit.className = 'dim-unit';
      unit.textContent = CM;
      main.appendChild(unit);

      const sp2 = document.createElement('div'); sp2.className = 'spacer';
      main.appendChild(sp2);
      main.appendChild(makeIconBtn('↑', 'הזזה למעלה', false, () => moveSection(col.id, sec.id, -1)));
      main.appendChild(makeIconBtn('↓', 'הזזה למטה', false, () => moveSection(col.id, sec.id, 1)));
      main.appendChild(makeIconBtn('×', 'מחיקת מדור', true, () => deleteSection(col.id, sec.id)));

      row.appendChild(main);

      // ── Extras line (shelf / drawer only) ──
      if (sec.type === 'shelf') {
        const ex = document.createElement('div');
        ex.className = 'sec-extras';
        const lbl = document.createElement('span');
        lbl.className = 'dim-label'; lbl.textContent = 'מדפים';
        ex.appendChild(lbl);
        const ni = document.createElement('input');
        ni.type = 'number'; ni.className = 'dim-input';
        ni.value = String(sec.shelfCount || 3); ni.min = '1'; ni.max = '12';
        ni.addEventListener('input', () =>
          updateSectionProp(col.id, sec.id, 'shelfCount', Math.max(1, Number(ni.value) || 1)));
        ex.appendChild(ni);
        row.appendChild(ex);
      } else if (sec.type === 'drawer') {
        const ex = document.createElement('div');
        ex.className = 'sec-extras';
        const lbl = document.createElement('span');
        lbl.className = 'dim-label'; lbl.textContent = 'מגירות';
        ex.appendChild(lbl);
        const ni = document.createElement('input');
        ni.type = 'number'; ni.className = 'dim-input';
        ni.value = String(sec.drawerCount || 2); ni.min = '1'; ni.max = '12';
        ni.addEventListener('input', () =>
          updateSectionProp(col.id, sec.id, 'drawerCount', Math.max(1, Number(ni.value) || 1)));
        ex.appendChild(ni);
        const glassLabel = document.createElement('label');
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.checked = !!sec.glassFront;
        cb.addEventListener('change', () =>
          updateSectionProp(col.id, sec.id, 'glassFront', cb.checked));
        glassLabel.appendChild(cb);
        glassLabel.appendChild(document.createTextNode(' זכוכית'));
        ex.appendChild(glassLabel);
        row.appendChild(ex);
      }

      body.appendChild(row);
    });

    const addSecBtn = document.createElement('button');
    addSecBtn.className = 'add-section-btn';
    addSecBtn.textContent = '+ הוספת מדור';
    addSecBtn.addEventListener('click', e => { e.stopPropagation(); addSection(col.id); });
    body.appendChild(addSecBtn);

    card.appendChild(body);

    // ── Remaining indicator ──
    const remEl = document.createElement('div');
    remEl.className = `rem-indicator ${remOk ? 'ok' : 'over'}`;
    remEl.dataset.col = col.id;
    const remVal = document.createElement('span');
    remVal.className = 'rem-val';
    remVal.textContent = remOk ? `נותרו ${rem} ${CM}` : `חריגה של ${Math.abs(rem)} ${CM}`;
    remEl.appendChild(remVal);
    card.appendChild(remEl);

    frag.appendChild(card);
  });

  // Add column card
  const addCard = document.createElement('div');
  addCard.className = 'col-card-add';
  const plus = document.createElement('span');
  plus.className = 'plus'; plus.textContent = '+';
  const addLbl = document.createElement('span'); addLbl.textContent = 'הוספת עמודה';
  addCard.appendChild(plus); addCard.appendChild(addLbl);
  addCard.addEventListener('click', addColumn);
  frag.appendChild(addCard);

  panel.innerHTML = '';
  panel.appendChild(frag);

  // Scroll selected card into view
  const sel = panel.querySelector(`.col-card[data-id="${selectedColId}"]`);
  if (sel) sel.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// ── DOM helpers ────────────────────────────────────────────────────────
function makeDimGroup(label, value, onInput) {
  const g = document.createElement('div');
  g.className = 'dim-group';
  const lbl = document.createElement('span');
  lbl.className = 'dim-label'; lbl.textContent = label;
  g.appendChild(lbl);
  const inp = document.createElement('input');
  inp.type = 'number'; inp.className = 'dim-input';
  inp.value = String(value); inp.min = '1'; inp.max = '999';
  inp.addEventListener('input', () => onInput(Number(inp.value)));
  g.appendChild(inp);
  const u = document.createElement('span');
  u.className = 'dim-unit'; u.textContent = CM;
  g.appendChild(u);
  return g;
}

function makeIconBtn(text, title, isDel, onClick) {
  const b = document.createElement('button');
  b.className = 'btn-icon' + (isDel ? ' del' : '');
  b.title = title; b.textContent = text;
  b.addEventListener('click', e => { e.stopPropagation(); onClick(); });
  return b;
}

// ── Full render ────────────────────────────────────────────────────────
function render() { renderElevation(); renderEditPanel(); }

function selectCol(id) {
  if (selectedColId === id) return;
  selectedColId = id;
  // Non-destructive: just move the highlight, don't rebuild the DOM
  // (rebuilding would cancel an in-progress input edit or dropdown open)
  document.querySelectorAll('#elevation .col-preview').forEach(el =>
    el.classList.toggle('selected', el.dataset.id === id));
  document.querySelectorAll('#editPanel .col-card').forEach(el =>
    el.classList.toggle('selected', el.dataset.id === id));
}

// ── Project name ───────────────────────────────────────────────────────
document.getElementById('projectName').addEventListener('input', function () {
  state.name = this.value;
  scheduleSave();
});

// ── Export ─────────────────────────────────────────────────────────────
document.getElementById('btnExport').addEventListener('click', () => {
  const totalWidth = state.columns.reduce((s, c) => s + (Number(c.width) || 0), 0);
  const payload = {
    project: state.name || 'Untitled',
    exportedAt: new Date().toISOString(),
    units: 'cm',
    totalWidth,
    columns: state.columns
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  const slug = ((state.name || '').replace(/[^\p{L}\p{N}]+/gu, '-').replace(/^-+|-+$/g, '').slice(0, 40)) || 'project';
  a.href = url; a.download = `combo-${slug}-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// ── Import ─────────────────────────────────────────────────────────────
document.getElementById('btnImport').addEventListener('click', () => {
  document.getElementById('importFile').value = '';
  document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data || !Array.isArray(data.columns)) throw new Error('bad format');
      _importPending = data;
      showModal(
        'ייבוא פרויקט',
        `לייבא את "${data.project || 'פרויקט'}"? העבודה הנוכחית תוחלף.`,
        () => {
          state = { name: _importPending.project || '', columns: _importPending.columns };
          selectedColId = state.columns.length ? state.columns[0].id : null;
          document.getElementById('projectName').value = state.name;
          _importPending = null;
          scheduleSave(); render();
        }
      );
    } catch {
      alert('לא ניתן לקרוא את הקובץ. בחרו קובץ JSON תקין שיוצא מקומבו.');
    }
  };
  reader.readAsText(file);
});

// ── New project ────────────────────────────────────────────────────────
document.getElementById('btnNew').addEventListener('click', () => {
  showModal(
    'פרויקט חדש',
    'פעולה זו תמחק את הפרויקט הנוכחי. ייצאו אותו קודם אם תרצו לשמור עליו.',
    () => {
      state = { name: '', columns: [] };
      selectedColId = null;
      document.getElementById('projectName').value = '';
      localStorage.removeItem('combo-project');
      render();
    }
  );
});

// ── Modal ──────────────────────────────────────────────────────────────
let _modalCb = null;

function showModal(title, msg, onConfirm) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMsg').textContent = msg;
  _modalCb = onConfirm;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  _modalCb = null;
}

document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.getElementById('modalConfirm').addEventListener('click', () => {
  const cb = _modalCb;
  closeModal();
  if (cb) cb();
});

// ── Resize ─────────────────────────────────────────────────────────────
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(renderElevation, 80);
});

// ── Init ───────────────────────────────────────────────────────────────
loadFromStorage();
document.getElementById('projectName').value = state.name || '';
render();
</script>
</body>
</html>
