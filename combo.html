<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעצב הארונות של קומבו</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #cfd4db;
    --brand-dark: #a8b0bc;
    --bg: #ffffff;
    --surface: #f5f6f7;
    --surface2: #eceef0;
    --text: #1a1a2e;
    --text2: #6b7280;
    --danger: #e53e3e;
    --ok: #38a169;
    --radius: 4px;
    --font: "Helvetica Neue", Arial, sans-serif;
    --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    height: 56px;
    border-bottom: 1px solid var(--surface2);
    background: var(--bg);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo { display: flex; align-items: center; margin-inline-end: 8px; }
  .logo-svg { height: 38px; width: auto; display: block; }

  .divider { width: 1px; height: 28px; background: var(--surface2); }

  .project-name-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
  .project-name-label { font-size: 11px; color: var(--text2); white-space: nowrap; }
  #projectName {
    border: 1px solid transparent; border-radius: var(--radius);
    padding: 4px 8px; font-size: 14px; font-family: var(--font);
    color: var(--text); background: transparent; width: 220px; transition: border-color 0.15s;
  }
  #projectName:hover { border-color: var(--brand); }
  #projectName:focus { outline: none; border-color: var(--brand-dark); background: var(--surface); }

  .header-actions { display: flex; gap: 8px; margin-inline-start: auto; }

  .btn {
    padding: 6px 14px; border-radius: var(--radius); font-size: 13px;
    font-family: var(--font); font-weight: 500; cursor: pointer;
    border: 1px solid transparent; transition: all 0.15s; white-space: nowrap;
  }
  .btn-ghost { background: transparent; border-color: var(--surface2); color: var(--text2); }
  .btn-ghost:hover { border-color: var(--brand-dark); color: var(--text); background: var(--surface); }
  .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
  .btn-primary:hover { background: #2d2d44; }
  .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
  .btn-danger:hover { background: #c53030; }

  .main { display: flex; flex-direction: row; flex: 1; overflow: hidden; }

  #elevationWrap {
    flex: 1; min-width: 0; background: var(--surface);
    overflow: auto; padding: 24px 24px 16px;
    display: flex; align-items: flex-end;
  }
  #elevation { display: flex; align-items: flex-end; gap: 0; min-height: 100%; }

  .col-preview {
    display: flex; flex-direction: column; border: 2px solid #b0b8c4;
    border-radius: 2px; cursor: pointer; transition: border-color 0.15s;
    position: relative; flex-shrink: 0; background: #fff; overflow: hidden;
  }
  .col-preview:hover { border-color: var(--brand-dark); }
  .col-preview.selected { border-color: var(--text); }

  .col-preview-label {
    position: absolute; top: 4px; left: 0; right: 0;
    text-align: center; font-size: 9px; color: var(--text2);
    letter-spacing: 0.04em; pointer-events: none; z-index: 2;
  }

  .sec-preview {
    width: 100%; border-bottom: 1px solid rgba(0,0,0,0.08);
    position: relative; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; overflow: hidden; min-height: 4px;
  }
  .sec-preview:last-child { border-bottom: none; }

  .sec-preview-label {
    font-size: 9px; color: var(--text2); text-align: center;
    line-height: 1.3; z-index: 2; position: relative;
    pointer-events: none; padding: 2px;
  }

  .sec-open { background: #ffffff; }
  .sec-shelf {
    background: repeating-linear-gradient(
      180deg,
      #f0f0ec 0px, #f0f0ec calc(100% / var(--n, 3) - 2px),
      #c8c8c0 calc(100% / var(--n, 3) - 2px), #c8c8c0 calc(100% / var(--n, 3))
    );
  }
  .sec-hanging { background: #eef3f8; }
  .sec-hanging::before {
    content: ''; position: absolute;
    top: 18%; left: 20%; right: 20%; height: 60%;
    border: 2px solid #7ba7c4; border-bottom: none; border-radius: 50% 50% 0 0;
  }
  .sec-drawer {
    background-image: repeating-linear-gradient(
      180deg,
      #faf5ee 0px, #faf5ee calc(100% / var(--n, 2) - 1px),
      #d4c9b8 calc(100% / var(--n, 2) - 1px), #d4c9b8 calc(100% / var(--n, 2))
    );
  }
  .sec-drawer.glass::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(200,220,240,0.28); pointer-events: none;
  }

  .rem-bar {
    flex-shrink: 0; min-height: 0;
    background: repeating-linear-gradient(45deg,
      rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 4px,
      transparent 4px, transparent 8px);
    border-top: 1px dashed #bbb;
  }
  .rem-bar.over { background: rgba(229,62,62,0.12); border-top-color: var(--danger); }

  .col-preview-add {
    width: 48px; height: 80px; border: 2px dashed var(--brand);
    border-radius: var(--radius); display: flex; align-items: center;
    justify-content: center; cursor: pointer; color: var(--brand-dark);
    font-size: 22px; margin-left: 12px; flex-shrink: 0;
    transition: all 0.15s; align-self: center;
  }
  .col-preview-add:hover { border-color: var(--text); color: var(--text); background: var(--surface2); }

  #editPanel {
    width: 320px; flex-shrink: 0; overflow-y: auto; overflow-x: hidden;
    display: flex; flex-direction: column; gap: 12px; padding: 14px;
    background: var(--bg); align-items: stretch;
    border-inline-end: 1px solid var(--surface2); order: -1;
  }

  .col-card {
    flex-shrink: 0; width: auto; border: 1px solid var(--surface2);
    border-radius: 6px; background: var(--surface);
    display: flex; flex-direction: column;
    transition: border-color 0.15s;
  }
  .col-card.selected { border-color: var(--text); }

  .col-card-head {
    display: flex; align-items: center; gap: 5px;
    padding: 7px 8px; border-bottom: 1px solid var(--surface2); flex-shrink: 0;
  }
  .col-num { font-size: 11px; font-weight: 600; color: var(--text2); width: 16px; }

  .dim-group { display: flex; align-items: center; gap: 3px; }
  .dim-label { font-size: 10px; color: var(--text2); }
  .dim-input {
    width: 46px; border: 1px solid var(--surface2); border-radius: var(--radius);
    padding: 3px 4px; font-size: 12px; font-family: var(--font);
    color: var(--text); background: var(--bg); text-align: center; direction: ltr;
  }
  .dim-input:focus { outline: none; border-color: var(--brand-dark); }
  .dim-unit { font-size: 10px; color: var(--text2); }

  .btn-icon {
    width: 22px; height: 22px; border: 1px solid var(--surface2);
    border-radius: var(--radius); background: var(--bg); cursor: pointer;
    font-size: 11px; display: flex; align-items: center; justify-content: center;
    color: var(--text2); transition: all 0.12s; flex-shrink: 0;
  }
  .btn-icon:hover { border-color: var(--brand-dark); color: var(--text); }
  .btn-icon.del:hover { border-color: var(--danger); color: var(--danger); }
  .spacer { flex: 1; }

  .col-card-body {
    flex: 1; overflow-y: auto; overflow-x: hidden; padding: 6px 8px;
    display: flex; flex-direction: column; gap: 4px;
  }

  .section-row {
    display: flex; flex-direction: column; gap: 5px;
    background: var(--bg); border: 1px solid var(--surface2);
    border-radius: var(--radius); padding: 5px 6px; flex-shrink: 0;
  }

  .section-main { display: flex; align-items: center; gap: 3px; }

  .sec-extras {
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    padding-top: 4px; border-top: 1px dashed var(--surface2);
  }
  .sec-extras .dim-input { width: 38px; }
  .sec-extras label {
    display: flex; align-items: center; gap: 3px;
    font-size: 11px; color: var(--text2); margin-inline-start: 6px; cursor: pointer;
  }
  .sec-extras input[type=checkbox] { width: 12px; height: 12px; cursor: pointer; }

  .rem-indicator {
    font-size: 10px; padding: 3px 8px 5px;
    flex-shrink: 0; color: var(--text2); border-top: 1px solid var(--surface2);
  }
  .rem-indicator .rem-val { font-weight: 600; }
  .rem-indicator.ok .rem-val { color: var(--ok); }
  .rem-indicator.over .rem-val { color: var(--danger); }

  .add-section-btn {
    font-size: 11px; color: var(--text2); background: none;
    border: 1px dashed var(--brand); border-radius: var(--radius);
    padding: 3px 8px; cursor: pointer; width: 100%;
    text-align: start; font-family: var(--font); transition: all 0.12s; flex-shrink: 0;
  }
  .add-section-btn:hover { border-color: var(--text); color: var(--text); }

  .col-card-add {
    flex-shrink: 0; width: 110px; min-height: 80px; border: 2px dashed var(--brand);
    border-radius: 6px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer;
    color: var(--brand-dark); font-size: 11px; gap: 4px;
    transition: all 0.15s; align-self: center;
  }
  .col-card-add:hover { border-color: var(--text); color: var(--text); background: var(--surface); }
  .col-card-add .plus { font-size: 20px; }

  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg); border-radius: 8px; padding: 28px 32px;
    max-width: 380px; width: 90%; box-shadow: var(--shadow-md);
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
  .modal p { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 22px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--brand); border-radius: 3px; }

  .empty-hint {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; width: 100%; color: var(--text2); gap: 12px;
  }
  .empty-hint svg { opacity: 0.2; }
  .empty-hint p { font-size: 13px; }

  /* type-select inline */
  .type-sel {
    border: none; background: transparent; font-size: 11px;
    font-family: var(--font); color: var(--text); cursor: pointer; width: 64px; flex-shrink: 0;
  }
  .type-sel:focus { outline: none; }

  /* ── Wall panel (left) ── */
  #wallPanel {
    width: 224px; flex-shrink: 0; order: 1;
    border-inline-start: 1px solid var(--surface2);
    background: var(--bg); padding: 16px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
  }
  .wall-panel-head { font-size: 13px; font-weight: 600; color: var(--text); }
  .wall-panel-empty { font-size: 12px; color: var(--text2); }
  .wall-panel-svg {
    display: flex; justify-content: center; padding: 12px 8px;
    background: var(--surface); border-radius: 6px;
  }
  .wall-top { display: block; }
  .wall-panel-type { font-size: 13px; font-weight: 600; text-align: center; }
  .wall-panel-list { display: flex; flex-direction: column; gap: 5px; margin-top: 2px; }
  .wall-info-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); }
  .wall-info-val { color: var(--text); font-weight: 600; direction: ltr; }

  /* ── Elevation bodies ── */
  #elevation { gap: 36px; }
  .elev-body { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .elev-body-cols { display: flex; align-items: flex-end; }
  .elev-body-empty {
    width: 90px; height: 130px; border: 2px dashed var(--brand); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    color: var(--brand-dark); font-size: 11px;
  }
  .elev-body-cap { font-size: 11px; color: var(--text2); text-align: center; white-space: nowrap; }
  .elev-body-name { font-weight: 600; color: var(--text); }
  .body-rem.ok { color: var(--ok); }
  .body-rem.over { color: var(--danger); font-weight: 600; }

  /* ── Edit panel body groups ── */
  .body-group {
    display: flex; flex-direction: column; gap: 8px;
    padding-bottom: 12px; border-bottom: 1px solid var(--surface2);
  }
  .body-group:last-child { border-bottom: none; padding-bottom: 0; }
  .body-group-head { display: flex; align-items: baseline; justify-content: space-between; }
  .body-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .body-len { font-size: 11px; color: var(--text2); direction: ltr; }
  .body-group > .body-rem { font-size: 11px; margin-top: -4px; }
  .col-warn { font-size: 10px; color: var(--danger); padding: 0 8px 5px; }
  .panel-hint { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* ── Wall modal ── */
  .modal-wall { max-width: 460px; }
  .wall-types { display: flex; gap: 8px; margin-bottom: 14px; }
  .wall-type-card {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 10px 6px; border: 1px solid var(--surface2); border-radius: 6px;
    background: var(--bg); cursor: pointer; font-family: var(--font); transition: all 0.15s;
  }
  .wall-type-card:hover { border-color: var(--brand-dark); }
  .wall-type-card.selected { border-color: var(--text); background: var(--surface); }
  .wall-type-name { font-size: 12px; color: var(--text); }
  .wall-orient { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .toggle-btn {
    padding: 5px 14px; border: 1px solid var(--surface2); border-radius: var(--radius);
    background: var(--bg); cursor: pointer; font-size: 12px; font-family: var(--font); color: var(--text2);
    transition: all 0.12s;
  }
  .toggle-btn:hover { border-color: var(--brand-dark); }
  .toggle-btn.selected { border-color: var(--text); color: var(--text); background: var(--surface); }
  .wall-fields { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }
  .wall-field { display: flex; align-items: center; gap: 8px; }
  .wall-field-label { font-size: 12px; color: var(--text2); width: 96px; }
  .wall-field .dim-input { width: 84px; text-align: center; }

  .col-card-dims {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px; border-bottom: 1px solid var(--surface2);
  }
</style>
</head>

<script>
// ── Escape helper (prevents XSS in innerHTML templates) ────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── i18n labels ────────────────────────────────────────────────────────
const CM = 'ס"מ';
const TYPE_NAMES = { open: 'פתוח', shelf: 'מדף', hanging: 'תלייה', drawer: 'מגירה' };
const TYPE_ORDER = ['open', 'shelf', 'hanging', 'drawer'];
const WALL_SEGS = { straight: 1, corner: 2, ushape: 3 };
const WALL_NAMES = { straight: 'קיר ישר', corner: 'קיר פינתי', ushape: 'קיר בצורת U' };
function segLabels(type) {
  if (type === 'straight') return ['אורך הקיר'];
  if (type === 'corner') return ['קיר 1', 'קיר 2'];
  return ['קיר 1', 'קיר 2', 'קיר 3'];
}

// ── State ──────────────────────────────────────────────────────────────
// Project { name, wall:{type,orientation,height,segments[]}, bodies:[ {id,columns:[]} ] }
// Each body (גוף) maps to one wall segment; columns live inside bodies.
function newProject() { return { name: '', wall: null, bodies: [] }; }

let state = newProject();
let selectedColId = null;
let _saveTimer = null;
let _importPending = null;

function uid() { return Math.random().toString(36).slice(2, 9); }
function clone(o) { return JSON.parse(JSON.stringify(o)); }
function hasWall() { return !!(state.wall && Array.isArray(state.bodies) && state.bodies.length); }
function wallHeight() { return Number(state.wall && state.wall.height) || 0; }
function segLen(bi) { return Number(state.wall && state.wall.segments[bi]) || 0; }
function colDepth(col) { return Number(col.depth) || 60; }
// A body's footprint depth at the corner = its deepest column (60 if empty).
function bodyDepth(body) { return body && body.columns.length ? Math.max(...body.columns.map(colDepth)) : 60; }
// At a corner, each body after the first loses the previous body's depth from
// its usable wall length (the previous closet occupies the corner footprint).
function usableLen(bi) { return segLen(bi) - (bi > 0 ? bodyDepth(state.bodies[bi - 1]) : 0); }

// ── Persistence ────────────────────────────────────────────────────────
function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    localStorage.setItem('combo-project', JSON.stringify(state));
  }, 300);
}

// Accept current format, or migrate the old { name, columns } shape.
function migrate(parsed) {
  if (!parsed || typeof parsed !== 'object') return null;
  if (parsed.wall && Array.isArray(parsed.bodies)) return parsed;
  if (Array.isArray(parsed.columns)) {
    const cols = parsed.columns;
    const maxH = cols.reduce((m, c) => Math.max(m, Number(c.totalHeight) || 0), 0) || 240;
    const sumW = cols.reduce((s, c) => s + (Number(c.width) || 0), 0) || 300;
    return {
      name: parsed.name || '',
      wall: { type: 'straight', height: maxH, segments: [sumW] },
      bodies: [{ id: uid(), columns: cols }]
    };
  }
  return null;
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem('combo-project');
    if (!raw) return;
    const m = migrate(JSON.parse(raw));
    if (m) { state = m; selectFirstColumn(); }
  } catch (e) { /* ignore corrupt data */ }
}

function selectFirstColumn() {
  selectedColId = null;
  for (const b of state.bodies) { if (b.columns.length) { selectedColId = b.columns[0].id; return; } }
}

// ── Locate helpers (columns live inside bodies) ────────────────────────
function locateCol(colId) {
  for (const b of state.bodies) {
    const i = b.columns.findIndex(c => c.id === colId);
    if (i >= 0) return { body: b, col: b.columns[i], i };
  }
  return null;
}
function findBody(bodyId) { return state.bodies.find(b => b.id === bodyId); }

// ── Column helpers ─────────────────────────────────────────────────────
function addColumn(bodyId) {
  const body = findBody(bodyId);
  if (!body) return;
  const col = { id: uid(), width: 60, totalHeight: wallHeight() || 220, depth: 60, sections: [] };
  body.columns.push(col);
  selectedColId = col.id;
  scheduleSave();
  render();
  requestAnimationFrame(() => {
    const card = document.querySelector(`.col-card[data-id="${col.id}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  });
}

function deleteColumn(id) {
  const loc = locateCol(id);
  if (!loc) return;
  loc.body.columns.splice(loc.i, 1);
  if (selectedColId === id) selectFirstColumn();
  scheduleSave(); render();
}

// Reorder within the same body only (bodies/גוף can't be swapped).
function moveColumn(id, dir) {
  const loc = locateCol(id);
  if (!loc) return;
  const cols = loc.body.columns;
  const j = loc.i + dir;
  if (j < 0 || j >= cols.length) return;
  [cols[loc.i], cols[j]] = [cols[j], cols[loc.i]];
  scheduleSave(); render();
}

function updateColumnProp(id, key, val) {
  const loc = locateCol(id);
  if (!loc) return;
  loc.col[key] = val;
  scheduleSave();
  renderElevation();
  refreshColInfo(id);
  refreshBodyInfo(loc.body.id);
  // A column's depth changes the corner deduction for the NEXT body.
  if (key === 'depth') {
    const bi = state.bodies.indexOf(loc.body);
    if (bi >= 0 && bi + 1 < state.bodies.length) refreshBodyInfo(state.bodies[bi + 1].id);
  }
}

// ── Section helpers ────────────────────────────────────────────────────
function addSection(colId) {
  const loc = locateCol(colId);
  if (!loc) return;
  loc.col.sections.push({ id: uid(), type: 'open', height: 40 });
  scheduleSave(); renderElevation(); renderEditPanel();
}

function deleteSection(colId, secId) {
  const loc = locateCol(colId);
  if (!loc) return;
  loc.col.sections = loc.col.sections.filter(s => s.id !== secId);
  scheduleSave(); renderElevation(); renderEditPanel();
}

function moveSection(colId, secId, dir) {
  const loc = locateCol(colId);
  if (!loc) return;
  const secs = loc.col.sections;
  const i = secs.findIndex(s => s.id === secId);
  const j = i + dir;
  if (j < 0 || j >= secs.length) return;
  [secs[i], secs[j]] = [secs[j], secs[i]];
  scheduleSave(); renderElevation(); renderEditPanel();
}

function updateSectionProp(colId, secId, key, val) {
  const loc = locateCol(colId);
  if (!loc) return;
  const sec = loc.col.sections.find(s => s.id === secId);
  if (!sec) return;
  sec[key] = val;
  if (key === 'type') {
    delete sec.shelfCount; delete sec.drawerCount; delete sec.glassFront;
    if (val === 'shelf') sec.shelfCount = 3;
    if (val === 'drawer') { sec.drawerCount = 2; sec.glassFront = false; }
  }
  scheduleSave();
  renderElevation();
  refreshColInfo(colId);
  if (key === 'type') renderEditPanel();
}

// ── Computations ───────────────────────────────────────────────────────
function remaining(col) {
  const used = col.sections.reduce((s, sec) => s + (Number(sec.height) || 0), 0);
  return (Number(col.totalHeight) || 0) - used;
}
function bodyUsedWidth(body) {
  return body.columns.reduce((s, c) => s + (Number(c.width) || 0), 0);
}
function bodyRemaining(body, bi) {
  return usableLen(bi) - bodyUsedWidth(body);
}

// In-place refresh of one column's height-remaining + height-vs-wall warning.
function refreshColInfo(colId) {
  const loc = locateCol(colId);
  if (!loc) return;
  const col = loc.col;
  const el = document.querySelector(`.rem-indicator[data-col="${colId}"]`);
  if (el) {
    const rem = remaining(col);
    el.className = `rem-indicator ${rem >= 0 ? 'ok' : 'over'}`;
    el.querySelector('.rem-val').textContent =
      rem >= 0 ? `נותרו ${rem} ${CM}` : `חריגה של ${Math.abs(rem)} ${CM}`;
  }
  const warn = document.querySelector(`.col-warn[data-col="${colId}"]`);
  if (warn) {
    const over = (Number(col.totalHeight) || 0) > wallHeight();
    warn.style.display = over ? 'block' : 'none';
    warn.textContent = over ? `גובה חורג מגובה הקיר (מקס׳ ${wallHeight()} ${CM})` : '';
  }
}

// In-place refresh of a body's width-remaining indicator(s).
function refreshBodyInfo(bodyId) {
  const bi = state.bodies.findIndex(b => b.id === bodyId);
  if (bi < 0) return;
  const rem = bodyRemaining(state.bodies[bi], bi);
  document.querySelectorAll(`.body-rem[data-body="${bodyId}"]`).forEach(el => {
    el.className = `body-rem ${rem >= 0 ? 'ok' : 'over'}`;
    el.textContent = rem >= 0 ? `נותרו ${rem} ${CM} בקיר` : `חריגה מהקיר: ${Math.abs(rem)} ${CM}`;
  });
}

// ── Scale ──────────────────────────────────────────────────────────────
function calcScale() {
  const cols = state.bodies.flatMap(b => b.columns);
  if (!cols.length) return 2;
  const wrap = document.getElementById('elevationWrap');
  const gapPx = 36 * Math.max(0, state.bodies.length - 1);
  const availW = wrap.clientWidth - 80 - gapPx;
  const availH = wrap.clientHeight - 70;
  const totalCm = state.bodies.reduce((s, b) => s + Math.max(bodyUsedWidth(b), 1), 0) || 60;
  const maxH = Math.max(wallHeight() || 1, ...cols.map(c => Number(c.totalHeight) || 1));
  const byW = Math.max(0.5, availW / totalCm);
  const byH = Math.max(0.5, availH / maxH);
  return Math.min(byW, byH, 4);
}

// ── Elevation rendering ────────────────────────────────────────────────
function buildColPreview(col, scale) {
  const w = Math.max(8, Math.round((Number(col.width) || 0) * scale));
  const totalH = Math.max(8, Math.round((Number(col.totalHeight) || 0) * scale));
  const rem = remaining(col);
  const remPx = rem > 0 ? Math.round(rem * scale) : 0;
  const overPx = rem < 0 ? Math.round(Math.abs(rem) * scale) : 0;

  const colEl = document.createElement('div');
  colEl.className = 'col-preview' + (col.id === selectedColId ? ' selected' : '');
  colEl.dataset.id = col.id;
  colEl.style.width = w + 'px';
  colEl.style.height = totalH + 'px';
  colEl.addEventListener('click', () => selectCol(col.id));

  if (w >= 28) {
    const lbl = document.createElement('div');
    lbl.className = 'col-preview-label';
    lbl.textContent = col.width + ' ' + CM;
    colEl.appendChild(lbl);
  }

  col.sections.forEach(sec => {
    const h = Math.max(4, Math.round((Number(sec.height) || 0) * scale));
    const secEl = document.createElement('div');
    const glassClass = (sec.type === 'drawer' && sec.glassFront) ? ' glass' : '';
    secEl.className = `sec-preview sec-${sec.type}${glassClass}`;
    secEl.style.height = h + 'px';
    if (sec.type === 'shelf') secEl.style.setProperty('--n', String(sec.shelfCount || 3));
    if (sec.type === 'drawer') secEl.style.setProperty('--n', String(sec.drawerCount || 2));

    if (h >= 18) {
      const lbl = document.createElement('span');
      lbl.className = 'sec-preview-label';
      const typeName = TYPE_NAMES[sec.type] || sec.type;
      let extra = '';
      if (sec.type === 'shelf') extra = ` ×${sec.shelfCount || 3}`;
      if (sec.type === 'drawer') extra = ` ×${sec.drawerCount || 2}`;
      lbl.textContent = typeName + extra + '\n' + sec.height + ' ' + CM;
      secEl.appendChild(lbl);
    }
    colEl.appendChild(secEl);
  });

  if (remPx > 0) {
    const bar = document.createElement('div');
    bar.className = 'rem-bar';
    bar.style.height = remPx + 'px';
    colEl.appendChild(bar);
  }
  if (overPx > 0) {
    const bar = document.createElement('div');
    bar.className = 'rem-bar over';
    bar.style.height = overPx + 'px';
    colEl.appendChild(bar);
  }
  return colEl;
}

function renderElevation() {
  const root = document.getElementById('elevation');
  root.textContent = '';

  if (!hasWall()) {
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    const p = document.createElement('p');
    p.textContent = 'הגדירו קיר כדי להתחיל';
    hint.appendChild(p);
    root.appendChild(hint);
    return;
  }

  const scale = calcScale();
  const frag = document.createDocumentFragment();

  state.bodies.forEach((body, bi) => {
    const bodyEl = document.createElement('div');
    bodyEl.className = 'elev-body';

    const colsEl = document.createElement('div');
    colsEl.className = 'elev-body-cols';
    if (!body.columns.length) {
      const ph = document.createElement('div');
      ph.className = 'elev-body-empty';
      ph.textContent = 'גוף ריק';
      colsEl.appendChild(ph);
    } else {
      body.columns.forEach(col => colsEl.appendChild(buildColPreview(col, scale)));
    }
    bodyEl.appendChild(colsEl);

    // caption: name · wall length · remaining
    const cap = document.createElement('div');
    cap.className = 'elev-body-cap';
    const name = document.createElement('span');
    name.className = 'elev-body-name';
    name.textContent = `גוף ${bi + 1}`;
    cap.appendChild(name);
    cap.appendChild(document.createTextNode(`  ·  זמין ${usableLen(bi)} ${CM}  ·  `));
    const rem = bodyRemaining(body, bi);
    const remSpan = document.createElement('span');
    remSpan.className = `body-rem ${rem >= 0 ? 'ok' : 'over'}`;
    remSpan.dataset.body = body.id;
    remSpan.textContent = rem >= 0 ? `נותרו ${rem} ${CM} בקיר` : `חריגה מהקיר: ${Math.abs(rem)} ${CM}`;
    cap.appendChild(remSpan);
    bodyEl.appendChild(cap);

    frag.appendChild(bodyEl);
  });

  root.appendChild(frag);
}

// ── Edit panel rendering ───────────────────────────────────────────────
function buildSectionRow(col, sec) {
  const row = document.createElement('div');
  row.className = 'section-row';

  // ── Main line: type, height, actions ──
  const main = document.createElement('div');
  main.className = 'section-main';

  const sel = document.createElement('select');
  sel.className = 'type-sel';
  TYPE_ORDER.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = TYPE_NAMES[t];
    if (sec.type === t) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => updateSectionProp(col.id, sec.id, 'type', sel.value));
  main.appendChild(sel);

  const hInput = document.createElement('input');
  hInput.type = 'number'; hInput.className = 'dim-input';
  hInput.value = String(sec.height); hInput.min = '1'; hInput.max = '999';
  hInput.style.width = '42px';
  hInput.addEventListener('input', () => {
    updateSectionProp(col.id, sec.id, 'height', Math.max(1, Number(hInput.value) || 1));
  });
  main.appendChild(hInput);

  const unit = document.createElement('span');
  unit.className = 'dim-unit';
  unit.textContent = CM;
  main.appendChild(unit);

  const sp2 = document.createElement('div'); sp2.className = 'spacer';
  main.appendChild(sp2);
  main.appendChild(makeIconBtn('↑', 'הזזה למעלה', false, () => moveSection(col.id, sec.id, -1)));
  main.appendChild(makeIconBtn('↓', 'הזזה למטה', false, () => moveSection(col.id, sec.id, 1)));
  main.appendChild(makeIconBtn('×', 'מחיקת מדור', true, () => deleteSection(col.id, sec.id)));

  row.appendChild(main);

  // ── Extras line (shelf / drawer only) ──
  if (sec.type === 'shelf') {
    const ex = document.createElement('div');
    ex.className = 'sec-extras';
    const lbl = document.createElement('span');
    lbl.className = 'dim-label'; lbl.textContent = 'מדפים';
    ex.appendChild(lbl);
    const ni = document.createElement('input');
    ni.type = 'number'; ni.className = 'dim-input';
    ni.value = String(sec.shelfCount || 3); ni.min = '1'; ni.max = '12';
    ni.addEventListener('input', () =>
      updateSectionProp(col.id, sec.id, 'shelfCount', Math.max(1, Number(ni.value) || 1)));
    ex.appendChild(ni);
    row.appendChild(ex);
  } else if (sec.type === 'drawer') {
    const ex = document.createElement('div');
    ex.className = 'sec-extras';
    const lbl = document.createElement('span');
    lbl.className = 'dim-label'; lbl.textContent = 'מגירות';
    ex.appendChild(lbl);
    const ni = document.createElement('input');
    ni.type = 'number'; ni.className = 'dim-input';
    ni.value = String(sec.drawerCount || 2); ni.min = '1'; ni.max = '12';
    ni.addEventListener('input', () =>
      updateSectionProp(col.id, sec.id, 'drawerCount', Math.max(1, Number(ni.value) || 1)));
    ex.appendChild(ni);
    const glassLabel = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = !!sec.glassFront;
    cb.addEventListener('change', () =>
      updateSectionProp(col.id, sec.id, 'glassFront', cb.checked));
    glassLabel.appendChild(cb);
    glassLabel.appendChild(document.createTextNode(' זכוכית'));
    ex.appendChild(glassLabel);
    row.appendChild(ex);
  }

  return row;
}

function buildColCard(col, ci) {
  const rem = remaining(col);
  const remOk = rem >= 0;

  const card = document.createElement('div');
  card.className = 'col-card' + (col.id === selectedColId ? ' selected' : '');
  card.dataset.id = col.id;

  // ── Card header ──
  const head = document.createElement('div');
  head.className = 'col-card-head';

  const numEl = document.createElement('span');
  numEl.className = 'col-num';
  numEl.textContent = String(ci + 1);
  head.appendChild(numEl);

  head.appendChild(makeDimGroup('רוחב', col.width, v => {
    updateColumnProp(col.id, 'width', Math.max(1, v || 1));
    selectCol(col.id);
  }));
  head.appendChild(makeDimGroup('גובה', col.totalHeight, v => {
    updateColumnProp(col.id, 'totalHeight', Math.max(1, v || 1));
    selectCol(col.id);
  }));

  const sp = document.createElement('div');
  sp.className = 'spacer';
  head.appendChild(sp);

  head.appendChild(makeIconBtn('→', 'הזזה ימינה', false, () => moveColumn(col.id, -1)));
  head.appendChild(makeIconBtn('←', 'הזזה שמאלה', false, () => moveColumn(col.id, 1)));
  head.appendChild(makeIconBtn('×', 'מחיקת עמודה', true, () => deleteColumn(col.id)));

  card.appendChild(head);

  // ── Depth row (column depth, used for corner footprint) ──
  const dimsRow = document.createElement('div');
  dimsRow.className = 'col-card-dims';
  dimsRow.appendChild(makeDimGroup('עומק', colDepth(col), v => {
    updateColumnProp(col.id, 'depth', Math.max(1, v || 1));
    selectCol(col.id);
  }));
  card.appendChild(dimsRow);

  // ── Card body (sections) ──
  const body = document.createElement('div');
  body.className = 'col-card-body';
  body.addEventListener('click', () => selectCol(col.id));

  col.sections.forEach(sec => body.appendChild(buildSectionRow(col, sec)));

  const addSecBtn = document.createElement('button');
  addSecBtn.className = 'add-section-btn';
  addSecBtn.textContent = '+ הוספת מדור';
  addSecBtn.addEventListener('click', e => { e.stopPropagation(); addSection(col.id); });
  body.appendChild(addSecBtn);

  card.appendChild(body);

  // ── Height-vs-wall warning ──
  const warn = document.createElement('div');
  warn.className = 'col-warn';
  warn.dataset.col = col.id;
  const over = (Number(col.totalHeight) || 0) > wallHeight();
  warn.style.display = over ? 'block' : 'none';
  warn.textContent = over ? `גובה חורג מגובה הקיר (מקס׳ ${wallHeight()} ${CM})` : '';
  card.appendChild(warn);

  // ── Height-remaining indicator ──
  const remEl = document.createElement('div');
  remEl.className = `rem-indicator ${remOk ? 'ok' : 'over'}`;
  remEl.dataset.col = col.id;
  const remVal = document.createElement('span');
  remVal.className = 'rem-val';
  remVal.textContent = remOk ? `נותרו ${rem} ${CM}` : `חריגה של ${Math.abs(rem)} ${CM}`;
  remEl.appendChild(remVal);
  card.appendChild(remEl);

  return card;
}

function renderEditPanel() {
  const panel = document.getElementById('editPanel');
  panel.textContent = '';

  if (!hasWall()) {
    const hint = document.createElement('div');
    hint.className = 'panel-hint';
    hint.textContent = 'הגדירו את הקיר כדי להתחיל לתכנן.';
    panel.appendChild(hint);
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    btn.textContent = 'הגדרת קיר';
    btn.style.marginTop = '10px';
    btn.addEventListener('click', () => openWallModal());
    panel.appendChild(btn);
    return;
  }

  const frag = document.createDocumentFragment();

  state.bodies.forEach((body, bi) => {
    const group = document.createElement('div');
    group.className = 'body-group';

    const gh = document.createElement('div');
    gh.className = 'body-group-head';
    const gtitle = document.createElement('span');
    gtitle.className = 'body-title';
    gtitle.textContent = `גוף ${bi + 1}`;
    const glen = document.createElement('span');
    glen.className = 'body-len';
    glen.textContent = bi > 0
      ? `זמין ${usableLen(bi)} / קיר ${segLen(bi)} ${CM}`
      : `קיר ${segLen(bi)} ${CM}`;
    gh.appendChild(gtitle); gh.appendChild(glen);
    group.appendChild(gh);

    const rem = bodyRemaining(body, bi);
    const bRem = document.createElement('div');

    bRem.dataset.body = body.id;
    bRem.textContent = rem >= 0 ? `נותרו ${rem} ${CM} בקיר` : `חריגה מהקיר: ${Math.abs(rem)} ${CM}`;
    group.appendChild(bRem);

    body.columns.forEach((col, ci) => group.appendChild(buildColCard(col, ci)));

    const addCard = document.createElement('div');

    addCard.appendChild(plus); addCard.appendChild(addLbl);
    addCard.addEventListener('click', () => addColumn(body.id));
    group.appendChild(addCard);

    frag.appendChild(group);

  const sel = panel.querySelector(`.col-card[data-id="${selectedColId}"]`);
  if (sel) sel.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
}

// ── DOM helpers ────────────────────────────────────────────────────────
function makeDimGroup(label, value, onInput) {
  const g = document.createElement('div');
  g.className = 'dim-group';
  const lbl = document.createElement('span');
  lbl.className = 'dim-label'; lbl.textContent = label;
  g.appendChild(lbl);
  const inp = document.createElement('input');
  inp.type = 'number'; inp.className = 'dim-input';
  inp.value = String(value); inp.min = '1'; inp.max = '999';
  inp.addEventListener('input', () => onInput(Number(inp.value)));
  g.appendChild(inp);
  const u = document.createElement('span');
  u.className = 'dim-unit'; u.textContent = CM;
  g.appendChild(u);
  return g;
}

function makeIconBtn(text, title, isDel, onClick) {
  const b = document.createElement('button');
  b.className = 'btn-icon' + (isDel ? ' del' : '');
  b.title = title; b.textContent = text;
  b.addEventListener('click', e => { e.stopPropagation(); onClick(); });
  return b;
}

// ── Full render ────────────────────────────────────────────────────────
function render() { renderElevation(); renderEditPanel(); renderWallPanel(); }

function selectCol(id) {
  if (selectedColId === id) return;
  selectedColId = id;
  // Non-destructive: just move the highlight, don't rebuild the DOM
  // (rebuilding would cancel an in-progress input edit or dropdown open)
  document.querySelectorAll('#elevation .col-preview').forEach(el =>
    el.classList.toggle('selected', el.dataset.id === id));
  document.querySelectorAll('#editPanel .col-card').forEach(el =>
    el.classList.toggle('selected', el.dataset.id === id));
}

// ── Project name ───────────────────────────────────────────────────────
document.getElementById('projectName').addEventListener('input', function () {
  state.name = this.value;
  scheduleSave();
});

// ── Export ─────────────────────────────────────────────────────────────
document.getElementById('btnExport').addEventListener('click', () => {
  const payload = {
    project: state.name || 'Untitled',
    exportedAt: new Date().toISOString(),
    units: 'cm',
    wall: state.wall,
    bodies: state.bodies
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  const slug = ((state.name || '').replace(/[^\p{L}\p{N}]+/gu, '-').replace(/^-+|-+$/g, '').slice(0, 40)) || 'project';
  a.href = url; a.download = `combo-${slug}-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// ── Import ─────────────────────────────────────────────────────────────
document.getElementById('btnImport').addEventListener('click', () => {
  document.getElementById('importFile').value = '';
  document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const migrated = migrate(data);
      if (!migrated) throw new Error('bad format');
      migrated.name = data.project || data.name || '';
      _importPending = migrated;
      showModal(
        'ייבוא פרויקט',
        `לייבא את "${data.project || 'פרויקט'}"? העבודה הנוכחית תוחלף.`,
        () => {
          state = _importPending;
          selectFirstColumn();
          document.getElementById('projectName').value = state.name;
          _importPending = null;
          scheduleSave(); render();
        }
      );
    } catch {
      alert('לא ניתן לקרוא את הקובץ. בחרו קובץ JSON תקין שיוצא מקומבו.');
    }
  };
  reader.readAsText(file);
});

// ── Modal ──────────────────────────────────────────────────────────────
let _modalCb = null;

function showModal(title, msg, onConfirm) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMsg').textContent = msg;
  _modalCb = onConfirm;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  _modalCb = null;
}

document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.getElementById('modalConfirm').addEventListener('click', () => {
  const cb = _modalCb;
  closeModal();
  if (cb) cb();
});

// ── Top-view SVG (built via DOM, no innerHTML) ─────────────────────────
function wallTopSVG(type, orientation, w, h) {
  const NS = 'http://www.w3.org/2000/svg';
  w = w || 100; h = h || 60;
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('class', 'wall-top');
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.setAttribute('width', String(w));
  svg.setAttribute('height', String(h));
  const x0 = 14, x1 = w - 14, yB = h - 14, yT = 14, ym = Math.round(h / 2);
  let d;
  if (type === 'straight') d = `M${x0},${ym} H${x1}`;
  else if (type === 'corner') d = `M${x0},${yB} H${x1} V${yT}`;
  else d = `M${x0},${yT} V${yB} H${x1} V${yT}`;
  const path = document.createElementNS(NS, 'path');
  path.setAttribute('d', d);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', '#2b2118');
  path.setAttribute('stroke-width', '7');
  path.setAttribute('stroke-linecap', 'round');
  path.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(path);
  return svg;
}

// ── Wall modal ─────────────────────────────────────────────────────────
let _wallDraft = null;
let _wallEditing = false;

function defaultWall() { return { type: 'straight', height: 240, segments: [300] }; }

function syncSegments() {
  const n = WALL_SEGS[_wallDraft.type];
  const segs = _wallDraft.segments || [];
  const out = [];
  for (let i = 0; i < n; i++) out.push(Number(segs[i]) > 0 ? Number(segs[i]) : 300);
  _wallDraft.segments = out;
  delete _wallDraft.depths;
}

function openWallModal() {
  _wallEditing = hasWall();
  _wallDraft = state.wall ? clone(state.wall) : defaultWall();
  syncSegments();
  document.getElementById('wallCancel').style.display = _wallEditing ? '' : 'none';
  renderWallModal();
  document.getElementById('wallModal').classList.add('open');
}

function wallField(label, value, onInput) {
  const wrap = document.createElement('div');
  wrap.className = 'wall-field';
  const lbl = document.createElement('span');
  lbl.className = 'wall-field-label'; lbl.textContent = label;
  const inp = document.createElement('input');
  inp.type = 'number'; inp.className = 'dim-input';
  inp.value = String(value); inp.min = '1'; inp.max = '2000';
  inp.addEventListener('input', () => onInput(Number(inp.value)));
  const u = document.createElement('span');
  u.className = 'dim-unit'; u.textContent = CM;
  wrap.appendChild(lbl); wrap.appendChild(inp); wrap.appendChild(u);
  return wrap;
}

function renderWallModal() {
  // Type cards
  const typesEl = document.getElementById('wallTypes');
  typesEl.textContent = '';
  ['straight', 'corner', 'ushape'].forEach(t => {
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'wall-type-card' + (_wallDraft.type === t ? ' selected' : '');
    card.appendChild(wallTopSVG(t, _wallDraft.orientation, 84, 52));
    const nm = document.createElement('span');
    nm.className = 'wall-type-name'; nm.textContent = WALL_NAMES[t];
    card.appendChild(nm);
    card.addEventListener('click', () => { _wallDraft.type = t; syncSegments(); renderWallModal(); });
    typesEl.appendChild(card);
  });

  // Height + per-segment (length + depth) fields
  const fieldsEl = document.getElementById('wallFields');
  fieldsEl.textContent = '';
  fieldsEl.appendChild(wallField('גובה הקיר', _wallDraft.height, v => { _wallDraft.height = Math.max(1, v || 1); }));
  const labels = segLabels(_wallDraft.type);
  _wallDraft.segments.forEach((len, i) => {
    fieldsEl.appendChild(wallField(labels[i], len, v => { _wallDraft.segments[i] = Math.max(1, v || 1); }));
  });
}

function applyWall() {
  state.wall = clone(_wallDraft);
  const n = WALL_SEGS[state.wall.type];
  if (!Array.isArray(state.bodies)) state.bodies = [];
  while (state.bodies.length < n) state.bodies.push({ id: uid(), columns: [] });
  if (state.bodies.length > n) state.bodies = state.bodies.slice(0, n);
  selectFirstColumn();
  scheduleSave();
  render();
}

function closeWallModal() { document.getElementById('wallModal').classList.remove('open'); }

document.getElementById('wallConfirm').addEventListener('click', () => { applyWall(); closeWallModal(); });
document.getElementById('wallCancel').addEventListener('click', closeWallModal);
document.getElementById('wallModal').addEventListener('click', e => {
  if (e.target === document.getElementById('wallModal') && _wallEditing) closeWallModal();
});

// ── Wall panel (left) ──────────────────────────────────────────────────
function wallInfoRow(label, val) {
  const r = document.createElement('div');
  r.className = 'wall-info-row';
  const l = document.createElement('span'); l.textContent = label;
  const v = document.createElement('span'); v.className = 'wall-info-val'; v.textContent = val + ' ' + CM;
  r.appendChild(l); r.appendChild(v);
  return r;
}

function renderWallPanel() {
  const panel = document.getElementById('wallPanel');
  if (!panel) return;
  panel.textContent = '';

  const head = document.createElement('div');
  head.className = 'wall-panel-head'; head.textContent = 'הקיר';
  panel.appendChild(head);

  if (!hasWall()) {
    const p = document.createElement('p');
    p.className = 'wall-panel-empty'; p.textContent = 'טרם הוגדר קיר.';
    panel.appendChild(p);
    const b = document.createElement('button');
    b.className = 'btn btn-primary'; b.textContent = 'הגדרת קיר'; b.style.width = '100%';
    b.addEventListener('click', () => openWallModal());
    panel.appendChild(b);
    return;
  }

  const w = state.wall;
  const svgWrap = document.createElement('div');
  svgWrap.className = 'wall-panel-svg';
  svgWrap.appendChild(wallTopSVG(w.type, w.orientation, 150, 96));
  panel.appendChild(svgWrap);

  const typeName = document.createElement('div');
  typeName.className = 'wall-panel-type';
  typeName.textContent = WALL_NAMES[w.type];
  panel.appendChild(typeName);

  const list = document.createElement('div');
  list.className = 'wall-panel-list';
  list.appendChild(wallInfoRow('גובה', w.height));
  const labels = segLabels(w.type);
  w.segments.forEach((len, i) => list.appendChild(wallInfoRow(labels[i], len)));
  panel.appendChild(list);

  const edit = document.createElement('button');
  edit.className = 'btn btn-ghost'; edit.textContent = 'עריכת הקיר';
  edit.style.width = '100%'; edit.style.marginTop = '10px';
  edit.addEventListener('click', () => openWallModal());
  panel.appendChild(edit);
}

// ── Resize ─────────────────────────────────────────────────────────────
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(renderElevation, 80);
});

// ── Init ───────────────────────────────────────────────────────────────
loadFromStorage();
document.getElementById('projectName').value = state.name || '';
render();
if (!hasWall()) openWallModal();
</script>
</body>
</html>
